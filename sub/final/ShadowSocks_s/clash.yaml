proxy-groups:
  - name: نوع انتخاب پروکسی 🔀
    type: select
    proxies:
      - اتصال پایدار 🔗
      - خودکار (بهترین پینگ) 🤖
      - دستی 🤏🏻
      - پشتیبان (در صورت قطعی) 🧯
      - توزیع بار (پایدار) 🧲
      - توزیع بار (موقت) ⏳
      - توزیع بار (گردشی) 🔁
      - قطع اینترنت ⛔
      - بدون فیلترشکن 🛡️
  - name: دستی 🤏🏻
    type: select
    proxies:
      - "@v2rayconfigamir 5079`"
      - "@v2rayconfigamir 5182`"
      - "@v2rayconfigamir 9576`"
      - "@v2rayconfigamir 6414`"
      - "@v2rayconfigamir 5142`"
      - "@v2rayconfigamir 7698`"
      - "@v2rayconfigamir 7749`"
      - "@v2rayconfigamir 3458`"
      - "@v2rayconfigamir 3764`"
      - "@v2rayconfigamir 2942"
  - name: خودکار (بهترین پینگ) 🤖
    type: url-test
    url: https://api.v2fly.org/checkConnection.svgz
    interval: 600
    tolerance: 50
    proxies:
      - "@v2rayconfigamir 5079`"
      - "@v2rayconfigamir 5182`"
      - "@v2rayconfigamir 9576`"
      - "@v2rayconfigamir 6414`"
      - "@v2rayconfigamir 5142`"
      - "@v2rayconfigamir 7698`"
      - "@v2rayconfigamir 7749`"
      - "@v2rayconfigamir 3458`"
      - "@v2rayconfigamir 3764`"
      - "@v2rayconfigamir 2942"
  - name: پشتیبان (در صورت قطعی) 🧯
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    proxies:
      - "@v2rayconfigamir 5079`"
      - "@v2rayconfigamir 5182`"
      - "@v2rayconfigamir 9576`"
      - "@v2rayconfigamir 6414`"
      - "@v2rayconfigamir 5142`"
      - "@v2rayconfigamir 7698`"
      - "@v2rayconfigamir 7749`"
      - "@v2rayconfigamir 3458`"
      - "@v2rayconfigamir 3764`"
      - "@v2rayconfigamir 2942"
  - name: اتصال پایدار 🔗
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 30
    tolerance: 50
    proxies:
      - خودکار (بهترین پینگ) 🤖
      - پشتیبان (در صورت قطعی) 🧯
      - دستی 🤏🏻
  - name: توزیع بار (پایدار) 🧲
    type: load-balance
    strategy: consistent-hashing
    url: https://api.v2fly.org/checkConnection.svgz
    interval: 600
