proxy-groups:
  - name: نوع انتخاب پروکسی 🔀
    type: select
    proxies:
      - اتصال پایدار 🔗
      - خودکار (بهترین پینگ) 🤖
      - دستی 🤏🏻
      - پشتیبان (در صورت قطعی) 🧯
      - توزیع بار (پایدار) 🧲
      - توزیع بار (موقت) ⏳
      - توزیع بار (گردشی) 🔁
      - قطع اینترنت ⛔
      - بدون فیلترشکن 🛡️
  - name: دستی 🤏🏻
    type: select
    proxies:
      - "@tel_melli"
      - "@tel_melli 2"
      - "@tel_melli 3"
      - "@tel_melli 4"
      - "@tel_melli`"
      - "@tel_melli 5"
      - "@tel_melli 6"
      - "@tel_melli 7"
      - "@tel_melli 8"
      - "@tel_melli 9"
  - name: خودکار (بهترین پینگ) 🤖
    type: url-test
    url: https://api.v2fly.org/checkConnection.svgz
    interval: 600
    tolerance: 50
    proxies:
      - "@tel_melli"
      - "@tel_melli 2"
      - "@tel_melli 3"
      - "@tel_melli 4"
      - "@tel_melli`"
      - "@tel_melli 5"
      - "@tel_melli 6"
      - "@tel_melli 7"
      - "@tel_melli 8"
      - "@tel_melli 9"
  - name: پشتیبان (در صورت قطعی) 🧯
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    proxies:
      - "@tel_melli"
      - "@tel_melli 2"
      - "@tel_melli 3"
      - "@tel_melli 4"
      - "@tel_melli`"
      - "@tel_melli 5"
      - "@tel_melli 6"
      - "@tel_melli 7"
      - "@tel_melli 8"
      - "@tel_melli 9"
  - name: اتصال پایدار 🔗
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 30
    tolerance: 50
    proxies:
      - خودکار (بهترین پینگ) 🤖
      - پشتیبان (در صورت قطعی) 🧯
      - دستی 🤏🏻
  - name: توزیع بار (پایدار) 🧲
    type: load-balance
    strategy: consistent-hashing
    url: https://api.v2fly.org/checkConnection.svgz
    interval: 600
    proxies:
      - "@tel_melli"
      - "@tel_melli 2"
      - "@tel_melli 3"
      - "@tel_melli 4"
      - "@tel_melli`"
      - "@tel_melli 5"
      - "@tel_melli 6"
      - "@tel_melli 7"
      - "@tel_melli 8"
      - "@tel_melli 9"
  - name: توزیع بار (گردشی) 🔁
    type: load-balance
    strategy: consistent-hashing
    url: https://api.v2fly.org/checkConnection.svgz
    interval: 600
    proxies:
      - "@tel_melli"
      - "@tel_melli 2"
