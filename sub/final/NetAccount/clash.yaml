proxy-groups:
  - name: نوع انتخاب پروکسی 🔀
    type: select
    proxies:
      - اتصال پایدار 🔗
      - خودکار (بهترین پینگ) 🤖
      - دستی 🤏🏻
      - پشتیبان (در صورت قطعی) 🧯
      - توزیع بار (پایدار) 🧲
      - توزیع بار (موقت) ⏳
      - توزیع بار (گردشی) 🔁
      - قطع اینترنت ⛔
      - بدون فیلترشکن 🛡️
  - name: دستی 🤏🏻
    type: select
    proxies:
      - NetAccount`
      - NetAccount` 2
      - NetAccount` 3
      - NetAccount` 4
      - NetAccount` 5
      - NetAccount` 6
      - NetAccount` 7
      - NetAccount` 8
      - NetAccount` 9
      - NetAccount` 10
      - NetAccount` 11
      - NetAccount` 12
      - NetAccount` 13
      - NetAccount` 14
      - NetAccount` 15
      - NetAccount` 16
      - NetAccount` 17
      - NetAccount` 18
  - name: خودکار (بهترین پینگ) 🤖
    type: url-test
    url: https://api.v2fly.org/checkConnection.svgz
    interval: 600
    tolerance: 50
    proxies:
      - NetAccount`
      - NetAccount` 2
      - NetAccount` 3
      - NetAccount` 4
      - NetAccount` 5
      - NetAccount` 6
      - NetAccount` 7
      - NetAccount` 8
      - NetAccount` 9
      - NetAccount` 10
      - NetAccount` 11
      - NetAccount` 12
